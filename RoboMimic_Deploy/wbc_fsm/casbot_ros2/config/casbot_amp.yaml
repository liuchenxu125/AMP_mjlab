# Casbot AMP Policy Config — Real Robot (ROS 2)
# Same observation/action dimensions as MuJoCo simulation,
# with real-robot PD gains overridden in the ROS node.

onnx_path: "../model/policy.onnx"

# Observation
num_actions: 25
num_obs: 336
history_length: 4
robot_state_dim: 84

# Clipping
clip_observations: 100.0
clip_actions: 100.0
action_scale: 0.25

# Velocity limits
vx_limit_min: -0.8
vx_limit_max: 2.5
vx_limit_min_slow: -0.8
vx_limit_max_slow: 1.0
vy_limit_min: -1.0
vy_limit_max: 1.0
wyaw_limit_min: -3.14
wyaw_limit_max: 3.14
dead_zone: 0.2
cmd_smoothes: 0.0

# Motor params (kept for dof_action_scale computation)
